services:
  - type: web
    name: tuitionmedia
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn tuitionmedia.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload"
    envVars:
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "TRUE"
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: SMS_BACKEND
        value: "console"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY_B64
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        value: "admin@tuitionmedia.com"
