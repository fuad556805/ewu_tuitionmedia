<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — TuitionMedia</title>
  {% load static %}<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body data-user-theme="dark">
<div class="orb orb-1"></div><div class="orb orb-2"></div>

<div class="auth-page">
  <div class="glass auth-card">
    <a href="{% url 'landing' %}" style="color:var(--muted);font-size:13px;text-decoration:none;display:block;margin-bottom:20px">← Back</a>
    <div class="auth-title">Join TuitionMedia</div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:22px">Create your free account instantly!</p>

    {% if error %}
    <div class="alert alert-danger" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'signup' %}">
      {% csrf_token %}

      <div class="role-picker">
        <label class="role-option selected" id="roleStudent">
          <input type="radio" name="role" value="student" checked style="display:none">
          <div style="font-size:22px;margin-bottom:4px">🎓</div>
          <div style="font-weight:600;font-size:14px">Student</div>
        </label>
        <label class="role-option" id="roleTutor">
          <input type="radio" name="role" value="tutor" style="display:none">
          <div style="font-size:22px;margin-bottom:4px">📚</div>
          <div style="font-weight:600;font-size:14px">Tutor</div>
        </label>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input class="form-control" name="first_name" placeholder="First name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input class="form-control" name="last_name" placeholder="Last name">
        </div>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input class="form-control" name="phone" placeholder="01XXXXXXXXX" required inputmode="tel">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input class="form-control" name="password" type="password" placeholder="Min 8 characters" required>
          <button type="button" class="pw-toggle">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;font-size:15px;padding:13px">
        Create Account →
      </button>
    </form>

    <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:16px">
      Already have an account? <a href="{% url 'login' %}" style="color:var(--accent);font-weight:600">Log In</a>
    </div>
  </div>
</div>

{% load static %}<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
