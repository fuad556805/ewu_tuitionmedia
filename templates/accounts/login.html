<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — TuitionMedia</title>
  {% load static %}<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body data-user-theme="dark">
<div class="orb orb-1"></div><div class="orb orb-2"></div>

<div class="auth-page">
  <div class="glass auth-card">
    <a href="{% url 'landing' %}" style="color:var(--muted);font-size:13px;text-decoration:none;display:block;margin-bottom:20px">← Back</a>
    <div class="auth-title">Welcome back </div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:22px">Log in to your account</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Phone Number</label>
        <input class="form-control" name="phone" placeholder="01XXXXXXXXX" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input class="form-control" name="password" type="password" placeholder="Password" required>
          <button type="button" class="pw-toggle">👁️</button>
        </div>
      </div>
      <a href="{% url 'forgot_password' %}" style="color:var(--accent);font-size:13px;text-decoration:underline;display:block;margin-top:-4px;margin-bottom:14px">Forgot password?</a>

      {% if error %}
      <div class="alert alert-danger">❌ {{ error }}</div>
      {% endif %}

      <button type="submit" class="btn btn-primary btn-block" style="font-size:15px;padding:13px">Log In →</button>
    </form>

    <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:14px">
      No account? <a href="{% url 'signup' %}" style="color:var(--accent);font-weight:600">Sign Up</a>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--glass-border);text-align:center">
      <small style="color:var(--muted)">Log in as admin using the same form.</small>
    </div>
  </div>
</div>

{% load static %}<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
